<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
  <!-- outer circle -->
  <circle cx="8" cy="8" r="6.5" fill="none" stroke="#bebebe" stroke-width="1.2"/>
  <!-- vertical meridian (ellipse for 3D look) -->
  <ellipse cx="8" cy="8" rx="3" ry="6.5" fill="none" stroke="#bebebe" stroke-width="0.9"/>
  <!-- horizontal equator -->
  <line x1="1.5" y1="8" x2="14.5" y2="8" stroke="#bebebe" stroke-width="0.9"/>
  <!-- latitude lines -->
  <ellipse cx="8" cy="5" rx="5.5" ry="0" fill="none" stroke="#bebebe" stroke-width="0"/>
  <path d="M3 5.2 Q8 3.5 13 5.2" fill="none" stroke="#bebebe" stroke-width="0.7"/>
  <path d="M3 10.8 Q8 12.5 13 10.8" fill="none" stroke="#bebebe" stroke-width="0.7"/>
</svg>
